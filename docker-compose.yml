services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: whiteboard
      POSTGRES_USER: whiteboard
      POSTGRES_PASSWORD: whiteboard
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whiteboard -d whiteboard"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  db-init:
    build:
      context: ./server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: whiteboard
      DB_USER: whiteboard
      DB_PASSWORD: whiteboard
      JWT_SECRET: super-secret-key
      NODE_ENV: development
    command: npm run db:init
    restart: "no"

  server:
    build:
      context: ./server
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      PORT: 5001
      CLIENT_ORIGIN: http://localhost:3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: whiteboard
      DB_USER: whiteboard
      DB_PASSWORD: whiteboard
      JWT_SECRET: super-secret-key
      NODE_ENV: development
    restart: on-failure
    ports:
      - "5001:5001"

  client:
    build:
      context: ./client
      args:
        REACT_APP_API_URL: /api
        REACT_APP_SOCKET_URL: ""
    depends_on:
      - server
    restart: on-failure
    ports:
      - "3000:80"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - client
      - server
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: on-failure

volumes:
  postgres_data:
