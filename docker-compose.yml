services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: whiteboard
      POSTGRES_USER: whiteboard
      POSTGRES_PASSWORD: whiteboard
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whiteboard -d whiteboard"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: ./server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 5001
      CLIENT_ORIGIN: http://localhost:3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: whiteboard
      DB_USER: whiteboard
      DB_PASSWORD: whiteboard
      JWT_SECRET: super-secret-key
      NODE_ENV: development
    restart: on-failure
    ports:
      - "5001:5001"

  client:
    build:
      context: ./client
    depends_on:
      - server
    environment:
      REACT_APP_API_URL: http://localhost:5001/api
      REACT_APP_SOCKET_URL: http://localhost:5001
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"

volumes:
  postgres_data:
