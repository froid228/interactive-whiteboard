databases:
  - name: interactive-whiteboard-db
    databaseName: whiteboard
    user: whiteboard

services:
  - type: web
    name: interactive-whiteboard-api
    env: node
    rootDir: server
    buildCommand: npm install
    preDeployCommand: npm run db:init
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: interactive-whiteboard-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://interactive-whiteboard-client.onrender.com
      - key: CORS_ORIGINS
        value: https://interactive-whiteboard-client.onrender.com

  - type: web
    name: interactive-whiteboard-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://interactive-whiteboard-api.onrender.com/api
      - key: REACT_APP_SOCKET_URL
        value: https://interactive-whiteboard-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
