name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: whiteboard
          POSTGRES_USER: whiteboard
          POSTGRES_PASSWORD: whiteboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U whiteboard -d whiteboard"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Test client
        run: npm test -- --watchAll=false
        working-directory: client

      - name: Test server
        run: npm test
        working-directory: server
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: whiteboard
          DB_USER: whiteboard
          DB_PASSWORD: whiteboard
          JWT_SECRET: ci-secret-key
          NODE_ENV: test

      - name: Build client
        run: npm run build
        working-directory: client

      - name: Build Docker stack
        run: docker compose build
